# Debian 13 (Trixie) minimal preseed configuration

# Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false

# Network - try DHCP briefly, continue without if unavailable (air-gap)
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 3
d-i netcfg/dhcp_options select Do not configure the network at this time
d-i netcfg/get_domain string local

# Mirror - use CD only (air-gap)
d-i apt-setup/use_mirror boolean false
d-i apt-setup/cdrom/set-first boolean true
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/services-select multiselect
d-i apt-setup/contrib boolean false
d-i apt-setup/non-free boolean false
d-i apt-setup/non-free-firmware boolean true
d-i debian-installer/allow_unauthenticated boolean true

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean false

# Root account - password asked interactively
d-i passwd/root-login boolean true
d-i passwd/make-user boolean false

# Partitioning - EFI + root (no swap)
# Disk selection is left interactive (not preseeded)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select efi-root
d-i partman-auto/expert_recipe string \
    efi-root :: \
        538 538 1075 free \
            $iflabel{ gpt } \
            $reusemethod{ } \
            method{ efi } \
            format{ } \
        . \
        1000 10000 -1 ext4 \
            $primary{ } \
            method{ format } \
            format{ } \
            use_filesystem{ } \
            filesystem{ ext4 } \
            mountpoint{ / } \
        .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

# Package selection - minimal (no standard task)
tasksel tasksel/first multiselect
d-i pkgsel/include string openssh-server chrony curl sudo nano less
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Firmware
d-i hw-detect/load_firmware boolean true

# Post-install: configure systemd-networkd and SSH
d-i preseed/late_command string \
    mkdir -p /target/etc/systemd/network ; \
    printf '%s\n' '[Match]' 'Name=en*' 'Name=eth*' '' '[Network]' 'DHCP=yes' > /target/etc/systemd/network/80-dhcp.network ; \
    in-target systemctl enable systemd-networkd.service ; \
    in-target systemctl enable systemd-resolved.service ; \
    ln -sf /run/systemd/resolve/resolv.conf /target/etc/resolv.conf ; \
    mkdir -p /target/etc/ssh/sshd_config.d ; \
    printf '%s\n' 'PermitRootLogin yes' 'PasswordAuthentication yes' 'UseDNS no' > /target/etc/ssh/sshd_config.d/default.conf

# Finish
d-i finish-install/reboot_in_progress note
